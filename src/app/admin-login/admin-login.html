<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center px-4">

  <!-- Card -->
  <div class="w-full max-w-md">

    <!-- Logo / Branding -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-500/10 border border-blue-500/20 mb-4">
        <!-- Ícone de hospital simples via SVG -->
        <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M19 21H5a2 2 0 01-2-2V7a2 2 0 012-2h14a2 2 0 012 2v12a2 2 0 01-2 2z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 11v4m-2-2h4"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 3v4M17 3v4"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">HULW · Bloco Cirúrgico</h1>
      <p class="text-slate-400 text-sm mt-1">Acesso restrito a administradores</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl">

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

        <!-- Email -->
        <div class="mb-5">
          <label for="email" class="block text-sm font-medium text-slate-300 mb-2">
            E-mail
          </label>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            autocomplete="email"
            placeholder="gestor@hulw.ufpb.br"
            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   transition duration-200 text-sm"
          />
        </div>

        <!-- Senha -->
        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-slate-300 mb-2">
            Senha
          </label>
          <div class="relative">
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              name="password"
              [(ngModel)]="password"
              required
              autocomplete="current-password"
              placeholder="••••••••"
              class="w-full px-4 py-3 pr-12 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                     transition duration-200 text-sm"
            />
            <!-- Botão mostrar/ocultar senha -->
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 transition"
              [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Mostrar senha'"
            >
              <svg *ngIf="!showPassword()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                     -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg *ngIf="showPassword()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7
                     a9.956 9.956 0 012.293-3.95M9.878 9.878A3 3 0 0114.12 14.12M3 3l18 18"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Mensagem de erro -->
        <div *ngIf="errorMessage()" class="mb-5 flex items-start gap-3 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3">
          <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a1 1 0 00.87 1.5h18.62a1 1 0 00.87-1.5L12.71 3.86a1 1 0 00-1.73 0z"/>
          </svg>
          <p class="text-sm text-red-300">{{ errorMessage() }}</p>
        </div>

        <!-- Botão de Login -->
        <button
          type="submit"
          [disabled]="isLoading() || !email || !password"
          class="w-full py-3 px-4 rounded-xl font-semibold text-sm text-white
                 bg-blue-600 hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-transparent
                 disabled:opacity-50 disabled:cursor-not-allowed
                 transition duration-200 flex items-center justify-center gap-2"
        >
          <!-- Spinner -->
          <svg *ngIf="isLoading()" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          {{ isLoading() ? 'Entrando...' : 'Entrar' }}
        </button>

      </form>
    </div>

    <!-- Rodapé -->
    <p class="text-center text-xs text-slate-600 mt-6">
      HULW · Sistema de Gestão Cirúrgica &copy; {{ currentYear }}
    </p>
  </div>

</div>
